name: Build Windows Installer

# Runs automatically when you push a version tag like: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content installer.iss) -replace '1\.0\.0', $version | Set-Content installer.iss
          iscc installer.iss
        shell: pwsh

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/XPhotoBlocker_Setup_*.exe
          generate_release_notes: true
